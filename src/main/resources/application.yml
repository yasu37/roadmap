spring:
  application:
    name: roadmap

  thymeleaf:
    cache: false

  datasource:
    url: jdbc:postgresql://localhost:5432/roadmap
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080